<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Language Translator</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f0b5e3, #f02ba5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    text-align: center;
    color: rgb(239, 71, 175);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

h2 {
    margin-bottom: 10px;
}

textarea {
    width: 100%;
    height: 100px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    margin: 10px 0;
}

select, button {
    padding: 10px;
    margin: 8px 5px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

button {
    background: #ff7eb3;
    color: white;
}

button:hover {
    background: #ff4e91;
}

#output {
    margin-top: 15px;
    padding: 10px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>🤖 AI Language Translator</h2>

    <textarea id="inputText" placeholder="Enter text or use mic..."></textarea>

    <div>
        <select id="sourceLang">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
        </select>

        ➡️

        <select id="targetLang">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
        </select>
    </div>

    <div>
        <button onclick="translateText()">Translate</button>
        <button onclick="startListening()">🎤 Speak</button>
        <button onclick="copyText()">Copy</button>
        <button onclick="speakText()">🔊 Listen</button>
    </div>

    <div id="output">Your translation will appear here...</div>
</div>

<script>
async function translateText() {
    let text = document.getElementById("inputText").value.trim();
    let source = document.getElementById("sourceLang").value;
    let target = document.getElementById("targetLang").value;

    if (!text) {
        document.getElementById("output").innerText = "Please enter text!";
        return;
    }

    document.getElementById("output").innerText = "Translating...";

    try {
        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${source}|${target}`;
        const response = await fetch(url);
        const data = await response.json();

        document.getElementById("output").innerText =
            data.responseData.translatedText;

    } catch (error) {
        document.getElementById("output").innerText = "Error: API not working";
        console.log(error);
    }
}
function startListening() {
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";

    recognition.onresult = function(event) {
        document.getElementById("inputText").value =
            event.results[0][0].transcript;
    };

    recognition.start();
}

function copyText() {
    let text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}
function speakText() {
    let text = document.getElementById("output").innerText;

    if (!text || text.includes("appear")) {
        alert("Nothing to speak!");
        return;
    }

    let speech = new SpeechSynthesisUtterance(text);
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
